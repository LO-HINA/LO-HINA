name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # 每天自动更新
  workflow_dispatch:     # 支持手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          # 👇 把这里改成你的 GitHub 用户名！！！
          github_user_name: LO-HINA
          # 生成的 SVG 保存路径（不用改）
          output: output/github-contribution-grid-snake.svg
          # 可选：自定义颜色（不想改就保留默认）
          color_snake: "#8b5cf6"
          color_dots: "#161b22"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update snake animation"
          file_pattern: output/github-contribution-grid-snake.svg
